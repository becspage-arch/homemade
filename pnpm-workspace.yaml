packages:
  - "apps/*"
  - "packages/*"
  - "infra"

# Approved native build scripts. All trusted deps:
# - sharp: Next.js image optimisation
# - unrs-resolver: ESLint module resolution
# - prisma / @prisma/engines: Prisma query engine native binary
allowBuilds:
  sharp: true
  unrs-resolver: true
  prisma: true
  '@prisma/engines': true
