packages:
  - "apps/*"
  - "packages/*"
  - "infra"

# Approved native build scripts. All trusted deps:
# - sharp: Next.js image optimisation
# - unrs-resolver: ESLint module resolution
# - prisma / @prisma/engines: Prisma query engine native binary
# - @clerk/shared: Clerk shared package
# - esbuild: bundler used by tsx for the Typesense backfill script
# - @sentry/cli: downloads the Sentry CLI binary for source-map upload at build time
# - core-js / protobufjs: postinstall is a harmless banner; transitive of posthog/inngest
allowBuilds:
  sharp: true
  unrs-resolver: true
  prisma: true
  '@prisma/engines': true
  '@clerk/shared': true
  esbuild: true
  '@sentry/cli': true
  core-js: true
  protobufjs: true
