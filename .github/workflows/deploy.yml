name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: homemade/web
  ECS_CLUSTER: homemade
  ECS_SERVICE: homemade-web
  # Forces actions that still ship Node 20 entrypoints (aws-actions/*,
  # docker/*) to run on Node 24. Removable once those actions update.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to ECS
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG_SLUG=${{ secrets.SENTRY_ORG_SLUG }}
            SENTRY_PROJECT_SLUG=${{ secrets.SENTRY_PROJECT_SLUG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Database migrations ──
      # Runs BEFORE ECS rollout so the new container code finds the migrated
      # schema. Idempotent — a no-op when no migrations are pending.
      #
      # pnpm/action-setup MUST come before actions/setup-node — v5 of
      # setup-node turned on the package-manager cache by default, which
      # tries to run pnpm during setup. Without pnpm already on PATH the
      # step fails with "Unable to locate executable file: pnpm".
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.0.9'
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install @homemade/db deps for migrate step
        run: pnpm install --filter @homemade/db --frozen-lockfile

      # Lint runs alongside the deploy as a non-blocking signal. Failures
      # don't fail the deploy (cleanup pass is on a separate session); the
      # job step shows up red so we know without having to grep logs.
      # Once the cleanup pass tightens rules, drop `continue-on-error`.
      - name: Install @homemade/web deps for lint
        run: pnpm install --filter @homemade/web --frozen-lockfile

      - name: Lint @homemade/web
        continue-on-error: true
        run: pnpm --filter @homemade/web lint

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # Strip `-pooler` from the Neon host so Prisma migrate connects
        # directly to the compute endpoint instead of through pgbouncer.
        # Prisma's migration advisory lock is session-scoped, but pgbouncer
        # keeps the underlying connection alive past process exit — so a
        # previous failed/cancelled CI run can leave the lock held and the
        # next migration times out at `pg_advisory_lock` (P1002). Direct
        # connection avoids that.
        run: |
          export DATABASE_URL="${DATABASE_URL/-pooler./.}"
          pnpm --filter @homemade/db migrate:deploy

      - name: Update ECS service (ensures >=1 task and pulls new image)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --desired-count 1 \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

      - name: Print service status
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,TaskDef:taskDefinition}' \
            --output table
