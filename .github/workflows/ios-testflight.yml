name: iOS TestFlight

# Manual-only initially. TestFlight uploads burn App Store Connect API
# quota — auto-firing on every push to main is wasteful while we're not
# actively iterating on the wrapper. Re-enable a path-filtered push trigger
# (apps/mobile/ios/**, apps/mobile/capacitor.config.*) once a release cadence
# settles.
on:
  workflow_dispatch:

jobs:
  build-upload:
    # Mirrors the Aura iOS pipeline (`runs-on: macos-26`). Pin the macOS
    # runner image so a future GitHub macos-latest bump can't break the build
    # mid-flight.
    runs-on: macos-26

    env:
      # Apple Developer team ID. Per memory/project_apple_developer.md Rebecca
      # uses the same Apple Dev account as the Aura project, so this is the
      # Aura team ID (YA5SH43A77). If a separate Homemade-only Apple Dev
      # account ever gets created, set the GitHub Variable IOS_TEAM_ID to
      # override.
      IOS_TEAM_ID: ${{ vars.IOS_TEAM_ID || 'YA5SH43A77' }}
      # Bundle ID is locked in apps/mobile/capacitor.config.ts.
      IOS_BUNDLE_ID: education.homemade.app
      # Provisioning profile name as it appears in Apple Developer →
      # Certificates, Identifiers & Profiles. Rebecca creates this when
      # generating the Distribution profile + p12 (see "Secrets needed"
      # below). Defaults match the convention "<App> App Store".
      IOS_PROVISIONING_PROFILE_NAME: ${{ vars.IOS_PROVISIONING_PROFILE_NAME || 'Homemade App Store' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.0.9'
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm

      # Install only the mobile workspace + its workspace deps. Capacitor
      # `cap sync ios` needs `@capacitor/cli`, `@capacitor/ios`, and the
      # Capacitor plugins listed in apps/mobile/package.json. The web app
      # is NOT built here — the wrapper loads https://homemade.education
      # directly per apps/mobile/capacitor.config.ts (server.url), so the
      # iOS bundle ships only the tiny static placeholder under
      # apps/mobile/dist/.
      - name: Install mobile deps
        run: pnpm install --filter @homemade/mobile --frozen-lockfile

      # Capacitor expects the webDir to exist before `cap sync`. The wrapper
      # uses an external server URL so the directory only needs a stub.
      - name: Ensure Capacitor webDir stub
        working-directory: apps/mobile
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            cat > dist/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>Homemade</title></head>
          <body><p>Loading homemade.education…</p></body></html>
          HTML
          fi

      - name: Capacitor sync iOS
        working-directory: apps/mobile
        run: npx cap sync ios

      # No CocoaPods step — this Capacitor iOS project uses Swift Package
      # Manager (note the `CapApp-SPM` folder under apps/mobile/ios/App).
      # Xcode resolves SPM dependencies automatically during the archive
      # step below.

      - name: Install Fastlane
        run: sudo gem install fastlane -N

      # Keychain bootstrap. The .p12 is intentionally generated with the
      # hardcoded password "ci" — macOS `security import` is unreliable with
      # empty passwords, but the password itself adds no security boundary
      # (the base64 .p12 inside a GitHub repository secret is the actual
      # protection). Hardcoding the password in the workflow removes a
      # whole class of cross-tool encoding bugs we hit earlier in PowerShell
      # → GitHub Secrets → macOS keychain.
      # Two secrets used:
      #   IOS_SIGNING_P12_BASE64       — base64 of the .p12 (password "ci")
      #   IOS_PROVISION_PROFILE_BASE64 — base64 of the .mobileprovision
      - name: Install signing assets
        env:
          IOS_SIGNING_P12_BASE64: ${{ secrets.IOS_SIGNING_P12_BASE64 }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -e

          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="ci_password"
          P12_PASSWORD="ci"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          echo "$IOS_SIGNING_P12_BASE64" | base64 --decode > cert.p12

          echo "p12 size: $(wc -c < cert.p12) bytes"
          echo "p12 SHA256: $(shasum -a 256 cert.p12 | awk '{print $1}')"
          if ! openssl pkcs12 -info -in cert.p12 -noout -passin "pass:$P12_PASSWORD" >/dev/null 2>&1; then
            echo "openssl: .p12 rejected — either IOS_SIGNING_P12_BASE64 is stale or the .p12 wasn't built with the expected password"
            exit 1
          fi
          echo "openssl: .p12 OK"

          security import cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

      - name: Build IPA
        working-directory: apps/mobile/ios/App
        run: |
          set -e

          ARCHIVE_PATH="$RUNNER_TEMP/App.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_PATH"

          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>

            <key>signingStyle</key>
            <string>manual</string>

            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>

            <key>signingCertificate</key>
            <string>Apple Distribution</string>

            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$IOS_PROVISIONING_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MARKETING_VERSION="1.0" \
            clean archive

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist exportOptions.plist

          echo "IPA_PATH=$(ls $EXPORT_PATH/*.ipa | head -n 1)" >> $GITHUB_ENV

      - name: Create App Store Connect API key file
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          echo "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode > key.p8

          python3 - <<'PY'
          import json, os
          key_id = os.environ["APPSTORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APPSTORE_CONNECT_ISSUER_ID"]
          with open("key.p8", "r", encoding="utf-8") as f:
              key = f.read()
          data = {"key_id": key_id, "issuer_id": issuer_id, "key": key, "in_house": False}
          with open("api_key.json", "w", encoding="utf-8") as f:
              json.dump(data, f)
          PY

          echo "ASC_API_KEY_PATH=$GITHUB_WORKSPACE/api_key.json" >> $GITHUB_ENV

      - name: Sanity check IPA + API key file
        run: |
          set -e
          echo "ASC_API_KEY_PATH=$ASC_API_KEY_PATH"
          echo "IPA_PATH=$IPA_PATH"
          ls -lah "$ASC_API_KEY_PATH"
          ls -lah "$IPA_PATH"

      - name: Upload to TestFlight
        run: |
          set -e
          fastlane pilot upload \
            --api_key_path "$ASC_API_KEY_PATH" \
            -i "$IPA_PATH" \
            --skip_waiting_for_build_processing true
